name: Build Windows Desktop Pet

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 下载项目
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 自动抠除白色背景
        run: |
        env:
       PYTHONIOENCODING: utf-8
          python remove_bg.py

      - name: 打包 EXE
        run: |
          pyinstaller `
            --noconsole `
            --onefile `
            --name "黄色小龙桌宠" `
            --add-data "character_transparent.png;." `
            pet.py

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: 黄色小龙桌宠-Windows
          path: dist/黄色小龙桌宠.exe
